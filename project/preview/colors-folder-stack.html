<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);font-family:var(--font-ui);color:var(--ink)}
  .wrap{padding:22px 24px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .lbl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin-top:6px}
  .mono{font-variant-numeric:tabular-nums}
  
.stk{display:flex;flex-direction:column;gap:0;border-radius:14px;overflow:hidden;box-shadow:var(--shadow-card);max-width:420px}
.f{padding:16px 20px;font-family:var(--font-ui);font-weight:400;font-style:normal;font-size:15px;color:#141414}
.meta{margin-left:18px;font-size:12px}
.scale{display:flex;flex-direction:column;gap:8px;justify-content:center}
.r{display:flex;align-items:center;gap:12px}
.dot{width:34px;height:34px;border-radius:8px}

</style></head><body><div class="wrap"><div class="row" style="align-items:center;gap:30px">
<div class="stk">
<div class="f" style="background:var(--folder-1)">info</div>
<div class="f" style="background:var(--folder-2)">start</div>
<div class="f" style="background:var(--folder-3)">check list</div>
<div class="f" style="background:var(--folder-4)">pictures</div>
<div class="f" style="background:var(--folder-5)">complete</div>
</div>
<div class="scale">
<div class="r"><span class="dot" style="background:#e4e4e4"></span><span class="mono" style="font-size:12px;font-weight:700">#e4e4e4</span><span class="meta" style="margin-left:0;color:var(--ink-3)">--folder-1</span></div><div class="r"><span class="dot" style="background:#d2d2d2"></span><span class="mono" style="font-size:12px;font-weight:700">#d2d2d2</span><span class="meta" style="margin-left:0;color:var(--ink-3)">--folder-2</span></div><div class="r"><span class="dot" style="background:#bcbcbc"></span><span class="mono" style="font-size:12px;font-weight:700">#bcbcbc</span><span class="meta" style="margin-left:0;color:var(--ink-3)">--folder-3</span></div><div class="r"><span class="dot" style="background:#a6a6a6"></span><span class="mono" style="font-size:12px;font-weight:700">#a6a6a6</span><span class="meta" style="margin-left:0;color:var(--ink-3)">--folder-4</span></div><div class="r"><span class="dot" style="background:#8f8f8f"></span><span class="mono" style="font-size:12px;font-weight:700">#8f8f8f</span><span class="meta" style="margin-left:0;color:var(--ink-3)">--folder-5</span></div>
</div>
</div></div></body></html>
