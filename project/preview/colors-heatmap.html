<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);font-family:var(--font-ui);color:var(--ink)}
  .wrap{padding:22px 24px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .lbl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin-top:6px}
  .mono{font-variant-numeric:tabular-nums}
  
.dots{display:flex;gap:14px;align-items:center}
.d{width:78px;height:78px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.9);font-size:26px;font-weight:300}
.cap{margin-top:14px;display:flex;justify-content:space-between;max-width:520px;font-size:11px;color:var(--ink-3)}

</style></head><body><div class="wrap"><div class="dots">
<div class="d" style="background:#6B3A2A">+</div><div class="d" style="background:#B5531F">+</div><div class="d" style="background:#E8731C">+</div><div class="d" style="background:#F2901C">+</div><div class="d" style="background:#F6B41C">+</div><div class="d" style="background:#F7C915">+</div>
</div>
<div class="cap"><span>empty / worst</span><span>full / best — condition gauge</span></div></div></body></html>
