<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);font-family:var(--font-ui);color:var(--ink)}
  .wrap{padding:22px 24px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .lbl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin-top:6px}
  .mono{font-variant-numeric:tabular-nums}
  
.row{align-items:flex-end}
.b{background:var(--folder-2);border:1px solid rgba(0,0,0,.08)}
.cap{font-size:11px;color:var(--ink-3);margin-top:8px;text-align:center}
.col{text-align:center}

</style></head><body><div class="wrap"><div class="row" style="gap:22px">
<div class="col"><div class="b" style="width:64px;height:64px;border-radius:8px"></div><div class="cap">--r-sm<br>8px</div></div><div class="col"><div class="b" style="width:84px;height:64px;border-radius:14px"></div><div class="cap">--r-md<br>14px</div></div><div class="col"><div class="b" style="width:100px;height:64px;border-radius:20px"></div><div class="cap">--r-lg<br>20px</div></div><div class="col"><div class="b" style="width:120px;height:64px;border-radius:999px"></div><div class="cap">--r-pill<br>999px</div></div>
</div></div></body></html>
