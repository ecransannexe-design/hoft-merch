<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);font-family:var(--font-ui);color:var(--ink)}
  .wrap{padding:22px 24px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .lbl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin-top:6px}
  .mono{font-variant-numeric:tabular-nums}
  
.specimen>div{border-bottom:1px solid var(--hairline);padding:9px 0;display:flex;align-items:baseline;gap:16px}
.tag{font-size:10px;color:var(--ink-3);width:120px;flex:none;text-transform:uppercase;letter-spacing:.05em}

</style></head><body><div class="wrap"><div class="specimen">
<div><span class="tag">Wordmark 900</span><span style="font-weight:900;font-size:28px;letter-spacing:-.02em">HOFT</span></div>
<div><span class="tag">H1 / 800</span><span style="font-weight:800;font-size:22px">HOME DEPOT — BROSSARD</span></div>
<div><span class="tag">H2 / 700 caps</span><span style="font-weight:700;font-size:17px;text-transform:uppercase">Year to date</span></div>
<div><span class="tag">Body / 400</span><span style="font-size:15px">Do not replace any product.</span></div>
<div><span class="tag">Serif italic</span><span class="hoft-serif-accent" style="font-size:20px">merchandising</span></div>
<div><span class="tag">Num / tabular</span><span class="num" style="font-size:17px">19 328,48$</span></div>
</div></div></body></html>
