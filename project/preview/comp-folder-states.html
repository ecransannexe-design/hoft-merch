<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);font-family:var(--font-ui);color:var(--ink)}
  .wrap{padding:22px 24px}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .lbl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin-top:14px}
  
.acc{max-width:300px;border-radius:14px;overflow:hidden;box-shadow:var(--shadow-folder)}
.f{font-family:var(--font-label);font-weight:800;font-style:italic;font-size:21px;padding:14px 18px}
.active{background:#fff;border:1px solid var(--hairline);border-bottom:none}
.body{background:#fff;border:1px solid var(--hairline);border-top:none;padding:0 18px 16px;font-size:13px;color:var(--ink-2)}

</style></head><body><div class="wrap"><div class="row" style="align-items:flex-start;gap:30px">
<div class="acc">
<div class="f active">info</div>
<div class="body">HOME DEPOT — BROSSARD<br><span style="color:var(--ink-3)">expanded / active</span></div>
<div class="f" style="background:var(--folder-2)">start</div>
<div class="f" style="background:var(--folder-3);color:#2a2a2a">check list</div>
<div class="f" style="background:var(--folder-4);color:#fff">pictures</div>
</div>
<div class="lbl" style="max-width:230px;margin-top:0">Selecting a folder expands it; the rest collapse and sink, stepping darker as they go.</div>
</div></div></body></html>
