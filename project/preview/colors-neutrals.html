<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);font-family:var(--font-ui);color:var(--ink)}
  .wrap{padding:22px 24px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .lbl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin-top:6px}
  .mono{font-variant-numeric:tabular-nums}
  
.sw{width:104px}
.chip{height:72px;border-radius:10px;border:1px solid rgba(0,0,0,.06)}
.name{font-size:12px;font-weight:700;margin-top:8px}
.hex{font-size:11px;color:var(--ink-3)}

</style></head><body><div class="wrap"><div class="row">

<div class="sw"><div class="chip" style="background:#141414"></div><div class="name">Ink</div><div class="hex mono">#141414</div></div>
<div class="sw"><div class="chip" style="background:#4a4a4a"></div><div class="name">Ink 2</div><div class="hex mono">#4a4a4a</div></div>
<div class="sw"><div class="chip" style="background:#7d7d7d"></div><div class="name">Ink 3</div><div class="hex mono">#7d7d7d</div></div>
<div class="sw"><div class="chip" style="background:#ffffff"></div><div class="name">Paper</div><div class="hex mono">#ffffff</div></div>
<div class="sw"><div class="chip" style="background:#f4f4f4"></div><div class="name">Paper 2</div><div class="hex mono">#f4f4f4</div></div>
<div class="sw"><div class="chip" style="background:#e3e3e3"></div><div class="name">Hairline</div><div class="hex mono">#e3e3e3</div></div>
</div></div></body></html>
