<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>*{box-sizing:border-box;margin:0;padding:0}html,body{font-family:var(--font-ui)}
.wrap{padding:0}.lbl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3)}

.wrap{display:flex;background:#fff}
.l{flex:1;display:flex;align-items:center;justify-content:center;padding:26px;border-right:1px solid var(--hairline)}
.d{flex:1;display:flex;align-items:center;justify-content:center;padding:26px;background:#333}
.l img,.d img{width:190px}
.d img{filter:invert(1)}
</style></head><body><div class="wrap">
<div class="l"><img src="../assets/hoft-logo.png" alt="HOFT merchandising"></div>
<div class="d"><img src="../assets/hoft-logo.png" alt="HOFT merchandising"></div>
</div></body></html>
