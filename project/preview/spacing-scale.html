<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);font-family:var(--font-ui);color:var(--ink)}
  .wrap{padding:22px 24px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .lbl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin-top:6px}
  .mono{font-variant-numeric:tabular-nums}
  
.r{display:flex;align-items:center;gap:14px;margin-bottom:9px}
.bar{height:16px;background:var(--folder-3);border-radius:3px}
.t{font-size:11px;color:var(--ink-3);width:120px}

</style></head><body><div class="wrap"><div class="r"><span class="t mono">--sp-1 · 4px</span><span class="bar" style="width:4px"></span></div><div class="r"><span class="t mono">--sp-2 · 8px</span><span class="bar" style="width:8px"></span></div><div class="r"><span class="t mono">--sp-3 · 12px</span><span class="bar" style="width:12px"></span></div><div class="r"><span class="t mono">--sp-4 · 16px</span><span class="bar" style="width:16px"></span></div><div class="r"><span class="t mono">--sp-5 · 24px</span><span class="bar" style="width:24px"></span></div><div class="r"><span class="t mono">--sp-6 · 32px</span><span class="bar" style="width:32px"></span></div><div class="r"><span class="t mono">--sp-7 · 48px</span><span class="bar" style="width:48px"></span></div></div></body></html>
