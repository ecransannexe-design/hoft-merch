<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);font-family:var(--font-ui);color:var(--ink)}
  .wrap{padding:22px 24px}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .lbl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin-top:14px}
  
.scr{background:#4a4a4a;border-radius:18px;padding:30px 26px;max-width:320px;display:flex;flex-direction:column;align-items:center;gap:10px}
.pill{width:100%;border:none;border-radius:999px;padding:13px 0;font-weight:800;font-size:14px;letter-spacing:.06em;cursor:pointer;background:#f4f4f4;color:#1b1b1b}
img{width:130px;margin-bottom:14px}

</style></head><body><div class="wrap"><div class="scr">
<img src="../assets/hoft-logo.png" alt="HOFT merchandising">
<button class="pill">WHO?</button>
<button class="pill">WHERE?</button>
</div>
<div class="lbl">Splash entry — pick rep (WHO?) then store (WHERE?); both chosen auto-enters. Black logo on #4a4a4a.</div></div></body></html>
