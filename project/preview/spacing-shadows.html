<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);font-family:var(--font-ui);color:var(--ink)}
  .wrap{padding:22px 24px}
  .row{display:flex;gap:14px;flex-wrap:wrap}
  .lbl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin-top:6px}
  .mono{font-variant-numeric:tabular-nums}
  
.col{text-align:center}
.b{width:150px;height:78px;border-radius:14px;background:#fff}
.cap{font-size:11px;color:var(--ink-3);margin-top:14px}

</style></head><body><div class="wrap"><div class="row" style="gap:34px;padding-top:6px">
<div class="col"><div class="b" style="box-shadow:var(--shadow-folder)"></div><div class="cap">folder<br>tactile stack</div></div>
<div class="col"><div class="b" style="box-shadow:var(--shadow-card)"></div><div class="cap">card<br>low elevation</div></div>
<div class="col"><div class="b" style="box-shadow:var(--shadow-pop)"></div><div class="cap">pop / menu<br>deep</div></div>
</div></div></body></html>
