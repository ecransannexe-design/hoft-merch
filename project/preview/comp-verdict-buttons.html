<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);font-family:var(--font-ui);color:var(--ink)}
  .wrap{padding:22px 24px}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .lbl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin-top:14px}
  
.btn{border:none;border-radius:999px;color:#fff;font-family:var(--font-ui);font-weight:800;font-style:italic;font-size:18px;letter-spacing:.04em;padding:15px 0;width:300px;cursor:pointer;box-shadow:var(--shadow-card)}
.stack{display:flex;flex-direction:column;gap:14px}

</style></head><body><div class="wrap"><div class="stack">
<button class="btn" style="background:var(--alert)">WHY!</button>
<button class="btn" style="background:var(--success)">CONGRATS!</button>
</div>
<div class="lbl">Full-width verdict pills — red when a store is down vs last year, green when up</div></div></body></html>
