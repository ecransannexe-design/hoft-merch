<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);font-family:var(--font-ui);color:var(--ink)}
  .wrap{padding:22px 24px}
  .row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .lbl{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-3);margin-top:14px}
  
.grid{display:grid;grid-template-columns:repeat(3,84px);gap:12px}
.cell{width:84px;height:84px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.92);font-size:30px;font-weight:300}
.add{background:var(--paper-2);border:1.5px dashed var(--folder-3);color:var(--ink-3)}

</style></head><body><div class="wrap"><div class="row" style="gap:36px;align-items:flex-start">
<div><div class="grid">
<div class="cell" style="background:var(--heat-1)">+</div>
<div class="cell" style="background:var(--heat-3)">+</div>
<div class="cell" style="background:var(--heat-2)">+</div>
<div class="cell" style="background:var(--heat-4)">+</div>
<div class="cell" style="background:var(--heat-6)">+</div>
<div class="cell add">+</div>
</div><div class="lbl">Arrival condition tiles</div></div>
</div></div></body></html>
